<!DOCTYPE html>
<html>
<head>
    <title>ML Model Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🧠 ML Model Builder</h1>

<div class="container">

    <input type="file" id="fileUpload">

    <select id="task">
        <option value="classification">Classification</option>
        <option value="regression">Regression</option>
        <option value="clustering">Clustering</option>
    </select>

    <select id="algorithm">
        <option value="rf">Random Forest</option>
        <option value="dt">Decision Tree</option>
        <option value="knn">KNN</option>
    </select>

    <button onclick="trainModel()">Train Model</button>
    <button onclick="trainAuto()">AutoML (Best Model)</button>
    <button onclick="downloadModel()">Download Model</button>

    <hr>

    <h3>🔮 Live Prediction</h3>
    <input type="text" id="inputValues" placeholder="Enter values (e.g., 30,60000,65)">
    <button onclick="predict()">Predict</button>

    <div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
